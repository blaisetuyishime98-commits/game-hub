<!DOCTYPE html>
<html>
<head>
<title>Quiz Game</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🧠 Quiz Game</h1>

<h2 id="question"></h2>

<div id="answers"></div>

<h3 id="score"></h3>

<script>

let questions = [
{
q:"What is the capital city of Rwanda?",
a:["Kigali","Nairobi","Kampala"],
correct:"Kigali"
},
{
q:"How many days are in one week?",
a:["5","7","10"],
correct:"7"
},
{
q:"Which language is used to create websites?",
a:["HTML","PDF","MP3"],
correct:"HTML"
}
];

let current=0;
let points=0;

function loadQuestion(){

let q=questions[current];

document.getElementById("question").innerHTML=q.q;

let answers="";

q.a.forEach(option=>{
answers += `<button onclick="check('${option}')">${option}</button><br><br>`;
});

document.getElementById("answers").innerHTML=answers;

}

function check(answer){

if(answer==questions[current].correct){
points++;
}

current++;

if(current < questions.length){
loadQuestion();
}else{
document.getElementById("question").innerHTML="Finished 🎉";
document.getElementById("answers").innerHTML="";
document.getElementById("score").innerHTML="Your score: "+points;
}

}

loadQuestion();

</script>

</body>
</html>
